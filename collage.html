<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef Portfolio Gallery</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #121212;
            --accent: #f2a900; /* Warm golden color matching high-end culinary design */
            --gap: 20px;
            --radius: 12px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Smooth Scrolling & Base Styles */
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Cinematic Header Setup */
        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 20px 0;
        }

        h1 {
            font-size: 2.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1rem;
            color: #737373;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
        }

        header::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background-color: var(--accent);
            margin: 20px auto 0 auto;
            border-radius: 2px;
        }

        /* High-End Responsive Grid System */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--gap);
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Cards & Cinematic Micro-interactions */
        .photo {
            position: relative;
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: var(--transition);
        }

        .photo img {
            display: block;
            width: 100%;
            height: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            transition: var(--transition);
            filter: brightness(0.9) contrast(1.05);
        }

        /* Hover Overlay & Zoom Effects */
        .photo::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
            opacity: 0;
            z-index: 1;
            transition: var(--transition);
        }

        .photo:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(242, 169, 0, 0.2);
        }

        .photo:hover img {
            transform: scale(1.06);
            filter: brightness(1.05) contrast(1.05);
        }

        .photo:hover::before {
            opacity: 1;
        }

        /* Responsive Mobile Breaks */
        @media (max-width: 900px) {
            body { padding: 30px 15px; }
            h1 { font-size: 2.25rem; }
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.85rem; }
            .gallery { grid-template-columns: 1fr; gap: 15px; }
            .photo img { aspect-ratio: 16/10; } /* Slightly wider field depth for single-column mobile reading */
        }

        /* MOBILE LIGHTBOX MODAL CAPABILITY */
        .lightbox {
            position: fixed;
            inset: 0;
            background-color: rgba(5, 5, 5, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .lightbox.active img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            line-height: 1;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        .lightbox-close:hover {
            opacity: 1;
            color: var(--accent);
        }
    </style>
</head>

    <!-- LIGHTBOX ENGINE TARGET -->
    <div class="lightbox" id="portfolioLightbox">
        <button class="lightbox-close" id="closeLightbox" aria-label="Close presentation overlay">&times;</button>
        <img src="" alt="Expanded portfolio preview" id="lightboxImg">
    </div>

    <script>
        const lightbox = document.getElementById('portfolioLightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const closeBtn = document.getElementById('closeLightbox');
        const photos = document.querySelectorAll('.photo');

        // Fire interactive view on selection click
        photos.forEach(photo => {
            photo.addEventListener('click', () => {
                const img = photo.querySelector('img');
                if (img) {
                    lightboxImg.src = img.src;
                    lightboxImg.alt = img.alt;
                    lightbox.classList.add('active');
                }
            });
        });

        // Close functions
        closeBtn.addEventListener('click', () => lightbox.classList.remove('active'));
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) lightbox.classList.remove('active');
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') lightbox.classList.remove('active');
        });
    </script>
